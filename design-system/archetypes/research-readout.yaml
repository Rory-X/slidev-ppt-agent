name: research-readout
description: Research findings presentation covering background context, methodology, detailed findings, and actionable implications. Evidence-heavy with rigorous data backing.
recommendedToken: tech-minimal
narrativePhases:
  - background
  - methodology
  - findings
  - implications
phaseSlideRange:
  background: [1, 2]
  methodology: [2, 3]
  findings: [4, 7]
  implications: [2, 3]
templateMapping:
  background: [cover, content-split]
  methodology: [content-split, detail-two-col]
  findings: [detail-two-col, hero-metric, three-cards, comparison-table, evidence-dashboard, insight-plus-proof]
  implications: [content-split, summary, process-with-risks]
contentTypes:
  background: [text, quote]
  methodology: [text, diagram, table]
  findings: [KPI, chart, table, diagram, code]
  implications: [text, diagram, checklist]
layoutPolicy:
  preferred:
    - two-cols-asymmetric
    - single-focus
    - three-cols
    - mixed-grid
  avoid:
    - dense-code-layout
styleRules:
  maxBulletsPerSlide: 7
  maxBulletsPerEvidenceSlide: 8
  minContentBlocksPerContentSlide: 3
  allowCodeBlocks: true
  maxVisualEffectsPerSlide: 2
  emphasisStyle: data-first
