name: technical-share
description: Technical architecture or engineering deep-dive presentation.
recommendedToken: tech-minimal
narrativePhases:
  - context-and-problem
  - solution-principles
  - architecture-and-flow
  - implementation-and-risk
  - roadmap-and-summary
layoutPolicy:
  preferred:
    - two-cols-asymmetric
    - single-focus
    - three-cols
    - mixed-grid
  avoid:
    - dense-code-layout
styleRules:
  maxVisualEffectsPerSlide: 2
  maxBulletsPerSlide: 7
  maxBulletsPerEvidenceSlide: 8
  minContentBlocksPerContentSlide: 3
  codeFirstSlidesAllowed: true
